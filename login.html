<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Log In & Sign Up | Vishambrio Cabs</title>
    <meta name="description" content="Sign in or register for an account with Vishambrio Cabs to access personalized sustainable travels and real-time mountain taxi bookings." />
    <link href="tailwind.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        .auth-bg {
            background: linear-gradient(135deg, #041f10 0%, #0d381c 50%, #064e3b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .auth-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("assets/heroimage.png") center/cover no-repeat;
            opacity: 0.15;
            filter: grayscale(40%) contrast(120%);
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .tab-btn {
            flex: 1;
            padding: 16px;
            font-family: Manrope, sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            color: rgba(255, 255, 255, 0.5);
        }
        .tab-btn.active {
            color: #34d399;
            border-bottom-color: #34d399;
            background: rgba(255, 255, 255, 0.02);
        }
        .form-input-glass {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-input-glass:focus {
            border-color: #34d399;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.15);
        }
        .form-input-glass::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed text-white">

    <div class="auth-bg px-4 py-8">
        <div class="relative z-10 w-full flex flex-col items-center">
            
            <!-- Logo Header -->
            <a href="index.html" class="flex flex-col items-center space-y-2 mb-8 animate-entrance opacity-0">
                <span class="text-3xl font-extrabold text-emerald-400 tracking-tighter font-headline">Vishambrio Cabs</span>
                <span class="text-xs uppercase tracking-[0.3em] font-semibold text-emerald-300/80">Sustainable Himachal</span>
            </a>

            <!-- Auth Box Container -->
            <div class="auth-container animate-entrance opacity-0 delay-100">
                <!-- Navigation Tabs -->
                <div class="flex border-b border-white/5">
                    <div id="tab-login" class="tab-btn active" onclick="switchTab('login')">Log In</div>
                    <div id="tab-signup" class="tab-btn" onclick="switchTab('signup')">Sign Up</div>
                </div>

                <!-- Forms Area -->
                <div class="p-8">
                    
                    <!-- Login Form -->
                    <form id="login-form" class="space-y-5" onsubmit="handleLoginSubmit(event)">
                        <div class="space-y-1">
                            <h2 class="text-2xl font-headline font-extrabold tracking-tight text-white">Welcome Back</h2>
                            <p class="text-xs font-semibold text-slate-300">Sign in to retrieve your personal green rides and invoices.</p>
                        </div>
                        <div class="space-y-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-emerald-300" for="login-email">Email Address</label>
                                <input class="form-input-glass" id="login-email" type="email" placeholder="arjun@gmail.com" required />
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-emerald-300" for="login-pass">Password</label>
                                <input class="form-input-glass" id="login-pass" type="password" placeholder="••••••••" required />
                            </div>
                        </div>
                        <button class="w-full btn-primary-gradient text-on-primary py-4 rounded-xl font-headline font-bold text-lg hover:shadow-lg active:scale-98 transition-all shadow-md mt-6 flex items-center justify-center gap-2">
                            Log In &nbsp;🔑
                        </button>
                    </form>

                    <!-- Signup Form -->
                    <form id="signup-form" class="space-y-5 hidden" onsubmit="handleSignupSubmit(event)">
                        <div class="space-y-1">
                            <h2 class="text-2xl font-headline font-extrabold tracking-tight text-white">Create Account</h2>
                            <p class="text-xs font-semibold text-slate-300">Start your zero-emission Himalayan journey with us today.</p>
                        </div>
                        <div class="space-y-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-emerald-300" for="signup-name">Full Name</label>
                                <input class="form-input-glass" id="signup-name" type="text" placeholder="Arjun Sharma" required />
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-emerald-300" for="signup-email">Email Address</label>
                                <input class="form-input-glass" id="signup-email" type="email" placeholder="arjun@gmail.com" required />
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-emerald-300" for="signup-pass">Password</label>
                                <input class="form-input-glass" id="signup-pass" type="password" placeholder="••••••••" required />
                            </div>
                        </div>
                        <button class="w-full btn-primary-gradient text-on-primary py-4 rounded-xl font-headline font-bold text-lg hover:shadow-lg active:scale-98 transition-all shadow-md mt-6 flex items-center justify-center gap-2">
                            Sign Up &nbsp;🌱
                        </button>
                    </form>

                </div>
            </div>

            <!-- Bottom Back Link -->
            <a href="index.html" class="mt-8 text-sm font-semibold text-emerald-300/80 hover:text-emerald-300 transition-colors flex items-center gap-1.5 animate-entrance opacity-0 delay-200">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                Back to Home Page
            </a>

        </div>
    </div>

    <!-- Load Auth Session helper -->
    <script src="auth.js"></script>
    <script>
        // Switch between login and signup tabs
        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const signupBtn = document.getElementById('tab-signup');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (tab === 'login') {
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                loginBtn.classList.remove('active');
                signupBtn.classList.add('active');
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
            }
        }

        // Handle Login Submission
        function handleLoginSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            // Extract a realistic name from email prefix for a premium feel
            let name = email.split('@')[0];
            name = name.charAt(0).toUpperCase() + name.slice(1);
            if (name.toLowerCase() === 'arjun') name = 'Arjun Sharma';
            
            // Log in via Auth manager
            if (Auth.login(email, name)) {
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect');
                const step = params.get('step');
                if (redirect) {
                    window.location.href = redirect + (step ? `?step=${step}` : '');
                } else {
                    // Redirect back to landing page and automatically pop open the bookings drawer!
                    window.location.href = 'index.html?openBookings=true';
                }
            }
        }

        // Handle Signup Submission
        function handleSignupSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            
            // Log in immediately on signup
            if (Auth.login(email, name)) {
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect');
                const step = params.get('step');
                if (redirect) {
                    window.location.href = redirect + (step ? `?step=${step}` : '');
                } else {
                    window.location.href = 'index.html?openBookings=true';
                }
            }
        }
    </script>
</body>
</html>
